<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio of a Computer Science student and aspiring Full-Stack Web Developer." />
  <title>Settapong Janajina — Full-Stack Web-Developer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    const savedTheme = localStorage.getItem('preferred-theme');
    if (savedTheme) {
      document.documentElement.dataset.theme = savedTheme;
    }
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/about.css" />
  <link rel="stylesheet" href="css/skills.css" />
  <link rel="stylesheet" href="css/projects.css" />
  <link rel="stylesheet" href="css/case-study.css" />
  <link rel="stylesheet" href="css/education.css" />
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav id="navbar" aria-label="Main navigation">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" aria-label="Home">
        <span class="logo-bracket">&lt;</span>sett_jn<span class="logo-bracket">/&gt;</span>
      </a>

      <!-- Desktop nav links -->
      <ul class="nav-links" id="navLinks" role="list">
        <li><a href="#hero"      class="nav-link" data-section="hero">Home</a></li>
        <li><a href="#about"     class="nav-link" data-section="about">About</a></li>
        <li><a href="#skills"    class="nav-link" data-section="skills">Skills</a></li>
        <li><a href="#projects"  class="nav-link" data-section="projects">Projects</a></li>
        <li><a href="#education" class="nav-link" data-section="education">Education</a></li>
        <li><a href="#contact"   class="nav-link" data-section="contact">Contact</a></li>
        <li class="theme-toggle-item">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
          </button>
        </li>
      </ul>

      <!-- Hamburger button (mobile) -->
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navLinks">
        <span class="ham-line"></span>
        <span class="ham-line"></span>
        <span class="ham-line"></span>
      </button>
    </div>
  </nav>

  <!-- ========== SECTION CONTAINERS ========== -->
  <!-- Each section is fetched and injected by JS -->
  <main id="main-content">
    <div id="section-hero"></div>
    <div id="section-about"></div>
    <div id="section-skills"></div>
    <div id="section-projects"></div>
    <div id="section-case-study"></div>
    <div id="section-education"></div>
    <div id="section-contact"></div>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <p>Designed &amp; built by <span class="accent">Settapong Janajina</span> &mdash; 2026</p>
    <p class="footer-sub">Computer Engineering Student · Full-Stack Web-Developer</p>
  </footer>

  <!-- ========== SCROLL TO TOP ========== -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top">&#8679;</button>

  <!-- ========== SCRIPTS ========== -->
  <script src="js/scroll.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
